{% extends 'ems/base.html' %}
{% block title %}Change Role — EMS{% endblock %}

{% block content %}
<div class="container py-5" style="max-width:480px">
  <div class="ems-card p-4">
    <div class="d-flex align-items-center gap-3 mb-4">
      <img src="{{ target_user.profile.get_avatar_url }}" height="56" width="56"
           class="rounded-circle border" alt="avatar"/>
      <div>
        <h4 class="mb-0">{{ target_user.get_full_name|default:target_user.username }}</h4>
        <small class="text-muted">@{{ target_user.username }}</small>
      </div>
    </div>

    <h5 class="mb-3"><i class="bi bi-shield-check me-2"></i>Change Role</h5>
    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Assign Role</label>
        {{ form.role }}
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-check-lg me-2"></i>Update Role
        </button>
        <a href="{% url 'admin_users' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
